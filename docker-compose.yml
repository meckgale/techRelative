services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - PROXY_TOKEN=${PROXY_TOKEN}
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://admin:admin@mongo:27017/techrelative?authSource=admin}
      - PROXY_TOKEN=${PROXY_TOKEN}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-admin}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

volumes:
  mongo_data:
