services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      - PROXY_TOKEN=${PROXY_TOKEN}
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://admin:admin@mongo:27017/techrelative?authSource=admin}
      - PROXY_TOKEN=${PROXY_TOKEN}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-admin}
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
